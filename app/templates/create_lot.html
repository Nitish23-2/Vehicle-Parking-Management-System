{% extends 'base.html' %}

{% block title %}Create Parking Lot{% endblock %}

{% block content %}
<div class="container mt-3">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
           <div class="card shadow-sm">
                <div class="card-header text-white bg-primary">
                    <h2 class="text-center">
                        <i class="fas fa-plus-circle"></i> Create Parking Lot
                    </h2>
                </div>

                <div class="card-body">
                    <form method="POST" action="{{url_for('main.create_lot')}}">
                        <div class="mb-3">
                            <label class="form-label">Name:</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Location Name:</label>
                            <input type="text" name="location_name" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Address:</label>
                            <input type="text" name="address" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Pincode:</label>
                            <input type="text" name="pincode" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Price_Per_Hour</label>
                            <input type="number" step="0.01" name="price_per_hour" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Max Spots:</label>
                            <input type="number" name="max_spots" class="form-control" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-check-circle"></i>Create Lot
                            </button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <a href="{{url_for('main.admin_dashboard')}}" class="btn btn-outline-secondary mt-2">
                        <i class="fas fa-arrow-left"></i>Back to Dashboard
                    </a>
                </div>
           </div>
        </div>
    </div>
</div>
{% endblock %}
