{% extends 'base.html' %}

{% block title %}Edit Parking Lot{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-warning text-white text-center">
                    <h2 class="mb-0">
                        <i class="fas fa-edit me-2"></i>Edit Parking Lot
                    </h2>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Lot Name:</label>
                            <input type="text" name="name" value="{{lot.name}}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Location Name:</label>
                            <input type="text" name="location_name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Address:</label>
                            <input type="text" name="address" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Pincode:</label>
                            <input type="text" class="form-control" name="pincode" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Price Per Hour:</label>
                            <input type="number" step="0.01" name="price_per_hour" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Max Spots:</label>
                            <input type="number" name="max_spots" class="form-control" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-warning">
                                <i class="fas fa-save me-1"></i>Update Lot
                            </button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <a href="{{url_for('main.admin_dashboard')}}" class="btn btn-outline-secondary mt-2">
                        <i class="fas fa-arrow-left"></i>Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
